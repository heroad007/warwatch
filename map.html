    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var map = L.map('conflictMap').setView([30.0, 30.0], 2);
            // Changed "light_nolabels" to "light_all" to bring back the text!
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            let geoJsonData = null;
            let geojsonLayer = null;
            let activeConflicts = {};

            fetch('https://cdn.jsdelivr.net/gh/datasets/geo-countries@master/data/countries.geojson')
                .then(response => response.json())
                .then(data => {
                    geoJsonData = data;
                    fetchLiveMapData(); // Initial data fetch
                    setInterval(fetchLiveMapData, 5000); // Poll for updates every 5 seconds
                })
                .catch(error => console.error("Error loading country borders:", error));

            function fetchLiveMapData() {
                if (!geoJsonData) return;

                fetch('get_map_data.php')
                    .then(response => response.json())
                    .then(data => {
                        activeConflicts = {};
                        data.forEach(conflict => {
                            activeConflicts[conflict.country_code] = conflict;
                        });

                        if (geojsonLayer) {
                            map.removeLayer(geojsonLayer);
                        }

                        geojsonLayer = L.geoJSON(geoJsonData, {
                            style: function(feature) {
                                // --- THE FIX: Using the exact key from the console with bracket notation ---
                                let countryCode = feature.properties['ISO3166-1-Alpha-3']; 

                                if (activeConflicts[countryCode]) {
                                    return { fillColor: activeConflicts[countryCode].color, weight: 1.5, opacity: 1, color: '#ffffff', fillOpacity: 0.75 };
                                } else {
                                    return { fillColor: '#e5e5e5', weight: 1, opacity: 1, color: '#ffffff', fillOpacity: 0.5 };
                                }
                            },
                            onEachFeature: function(feature, layer) {
                                // --- THE FIX: Using the exact keys from the console ---
                                let countryCode = feature.properties['ISO3166-1-Alpha-3']; 
                                let countryName = feature.properties['name'];  

                                if (activeConflicts[countryCode]) {
                                    let conflict = activeConflicts[countryCode];
                                    let popupContent = `
                                        <div style="font-family: 'Open Sans', sans-serif;">
                                            <h4 style="color:${conflict.color}; margin-bottom:5px; border-bottom:1px solid #ccc; padding-bottom:5px;">${conflict.war_name}</h4>
                                            <p style="margin:0; font-size:12px;"><b>Country:</b> ${countryName}</p>
                                            <p style="margin:0; font-size:12px;"><b>Status:</b> ${conflict.status}</p>
                                            <p style="margin:0; font-size:12px;"><b>Impact:</b> ${conflict.impact}</p>
                                        </div>
                                    `;
                                    layer.bindPopup(popupContent);
                                    
                                    layer.on('mouseover', function() { this.setStyle({ fillOpacity: 0.95, weight: 2 }); });
                                    layer.on('mouseout', function() { this.setStyle({ fillOpacity: 0.75, weight: 1.5 }); });
                                }
                            }
                        }).addTo(map);
                    })
                    .catch(error => console.error('Error fetching conflict data:', error));
            }
        });
    </script>
