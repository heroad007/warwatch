<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <!-- Global Vanta Waves Background -->
    <div id="vanta-bg-global"></div>
    
    <div class="page-wrapper">
    <!-- ... rest of your code ... -->s
        <header class="sticky-header">
            <div class="logo-area">
                <a href="index.html" style="text-decoration: none; display: inline-block;">
                <h1>WAR<span class="logo-red">WATCH</span></h1>
                </a>
            </div>
            <nav class="main-nav">
                <a href="index.html">Dashboard</a>
                <a href="login.html" class="nav-right">Login</a>
            </nav>
        </header>

        <main class="content-area" style="text-align: center;">
            <h2 class="section-title">Create a New Account</h2>
            
            <div class="report-box" style="max-width: 450px; margin: 40px auto;">
                <!-- This form submits to signup_action.php and calls JS validation first -->
                <form action="signup_action.php" method="POST" onsubmit="return validateSignUp()">
                    <div style="margin-bottom: 20px; text-align: left;">
                        <label for="username" style="font-weight: bold; font-family: 'Libre Baskerville', serif;">Username:</label>
                        <input type="text" id="username" name="username" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc;">
                    </div>
                    <div style="margin-bottom: 20px; text-align: left;">
                        <label for="password" style="font-weight: bold; font-family: 'Libre Baskerville', serif;">Password:</label>
                        <input type="password" id="password" name="password" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc;">
                    </div>
                    <div style="margin-bottom: 25px; text-align: left;">
                        <label for="confirm_password" style="font-weight: bold; font-family: 'Libre Baskerville', serif;">Confirm Password:</label>
                        <input type="password" id="confirm_password" name="confirm_password" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc;">
                    </div>
                    <button type="submit" style="background: #152e4d; color: white; padding: 12px 25px; border: none; cursor: pointer; width: 100%; font-size: 16px; font-family: 'Libre Baskerville', serif;">REGISTER</button>
                </form>
            </div>
        </main>
    </div>

    <!-- Unit 2: JavaScript Form Validation -->
    <script>
        function validateSignUp() {
            var password = document.getElementById("password").value;
            var confirm_password = document.getElementById("confirm_password").value;

            if (password !== confirm_password) {
                alert("Passwords do not match. Please try again.");
                return false; // This stops the form from submitting
            }
            return true; // Allows the form to submit
        }
    </script>
<!-- Three.js (Required for Vanta) -->
